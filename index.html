<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Adat Jawa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="weddingAudio" loop>
        <source src="https://Lestari.mp3" type="audio/mpeg">
    </audio>

    <div id="overlayer">
        <div class="overlay-content" data-aos="zoom-in">
            <div class="gunungan"></div>
            <h2>SERAT ULEM</h2>
            <h1>Miko & Sekar</h1>
            <div class="guest-info">
                <p>Kagem Bapak/Ibu/Sdr/i:</p>
                <h3 id="guest-name-overlay">Tamu Undangan</h3>
            </div>
            <button onclick="mulaiUndangan()" class="btn-open">Buka Undangan</button>
        </div>
    </div>

    <section class="hero">
        <div class="ornamen-top" data-aos="fade-down" data-aos-duration="1500"></div>
        <div class="content" data-aos="zoom-in" data-aos-duration="2000">
            <h2 class="sub-title">Pernikahan Dari</h2>
            <h1>Miko & Sekar</h1>
            <div class="guest-box">
                <p>Selamat Datang,</p>
                <h3 id="guest-name">Tamu Undangan</h3>
            </div>
            <p class="date">Sabtu, 12 Desember 2026</p>
        </div>
        <div class="ornamen-bottom" data-aos="fade-up" data-aos-duration="1500"></div>
    </section>

    <section class="details">
        <div class="gunungan" data-aos="fade-up"></div>
        <h2 data-aos="fade-up">Giyanti Kromo</h2>
        
        <div class="event-grid">
            <div class="event-card" data-aos="fade-right">
                <img src="https://cdn-icons-png.flaticon.com/512/3663/3663361.png" width="40" alt="icon">
                <h3>Akad Nikah</h3>
                <p>08.00 WIB</p>
                <p>Kediaman Mempelai Wanita</p>
            </div>
            <div class="event-card" data-aos="fade-left">
                <img src="https://cdn-icons-png.flaticon.com/512/3663/3663361.png" width="40" alt="icon">
                <h3>Resepsi</h3>
                <p>11.00 WIB - Selesai</p>
                <p>Sasana Handrawina</p>
            </div>
        </div>
    </section>

    <section class="gallery" data-aos="fade-up">
        <h2 class="gallery-title">Momen Bahagia</h2>
        <div class="gallery-container">
            <div class="gallery-item" data-aos="zoom-in"><img src="galeri1.jpg" alt="Foto 1"></div>
            <div class="gallery-item" data-aos="zoom-in"><img src="galeri2.jpg" alt="Foto 2"></div>
            <div class="gallery-item" data-aos="zoom-in"><img src="galeri3.jpg" alt="Foto 3"></div>
            <div class="gallery-item" data-aos="zoom-in"><img src="galeri4.jpg" alt="Foto 4"></div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
